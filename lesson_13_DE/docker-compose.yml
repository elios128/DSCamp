services:

  db:
    image: postgres:17
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: ./app

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_HOST: db
      DB_NAME: db
      DB_USER: postgres
      DB_PASSWORD: admin

    volumes:
      - ./data:/data